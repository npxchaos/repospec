name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: build · lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: JSON Schema up to date
        run: |
          pnpm schema
          git diff --quiet schemas/ \
            || (echo "::error::schemas/ is stale — run \`pnpm schema\` and commit." && exit 1)

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Examples in sync (AGENTS.md drift-guard)
        run: |
          for ex in examples/demo-service examples/acme-billing; do
            echo "· $ex"
            ( cd "$ex" && node "$GITHUB_WORKSPACE/packages/cli/dist/bin.js" sync --check )
          done
