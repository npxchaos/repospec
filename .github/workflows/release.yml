name: Release

# Automated versioning + npm publish via Changesets.
#
# Flow:
#   1. A change lands on main carrying a changeset (`pnpm changeset`).
#   2. This workflow opens/updates a "Version Packages" PR that consumes the
#      changesets, bumps versions in lockstep, and updates CHANGELOG.md.
#   3. Merging that PR runs this workflow again, which publishes the bumped
#      @repospec/* packages to npm (with provenance) and creates GitHub releases.
on:
  push:
    branches: [main]

permissions:
  contents: write # push the version commit / create git tags + releases
  pull-requests: write # open the "Version Packages" PR
  id-token: write # npm provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: version / publish @repospec/*
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Version or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'chore: version @repospec packages'
          title: 'chore: version @repospec packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
