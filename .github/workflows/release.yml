name: Release

# Publishes the @repospec/* packages to npm when a version tag is pushed.
# Usage: bump versions, commit, then `git tag vX.Y.Z && git push origin vX.Y.Z`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: publish @repospec/* to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish
        run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
