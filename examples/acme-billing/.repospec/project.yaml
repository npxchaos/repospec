# yaml-language-server: $schema=https://repospec.dev/schema/0.1/project.schema.json
repospecProtocol: "0.1"
project:
  name: acme-billing
  description: Usage-based billing service for the Acme platform.
  type: service
  repository: https://github.com/npxchaos/repospec
stack:
  languages:
    - typescript
  runtimes:
    - node20
  packageManager: pnpm
  frameworks:
    - nestjs
  testing:
    - vitest
conventions:
  formatter: prettier
  linter: eslint
  commitStyle: conventional
  branching: trunk
documents:
  constitution: constitution.md
  architecture: architecture.md
  workflow: workflow.md
agents:
  dir: agents
rules:
  dir: rules
adapters:
  - id: claude
  - id: agents
plugins: []
